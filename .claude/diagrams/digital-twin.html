<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>数字分身 (Digital Twin) 架构图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;padding:30px;display:flex;flex-direction:column;align-items:center}
h1{font-size:20px;margin-bottom:25px;color:#f0f6fc}
svg{max-width:1450px;background:#0d1117}
.node rect{fill:#161b22;stroke:#30363d;stroke-width:1.5;rx:6;ry:6}
.node .title{font-size:13px;font-weight:600;fill:#f0f6fc}

.edge{stroke:#58a6ff;stroke-width:1.5;fill:none}

.edge-llm{stroke:#d2a8ff;stroke-width:1.5;fill:none;stroke-dasharray:3,3}
.badge{font-size:9px;fill:#8b949e}
.section-title{font-size:14px;font-weight:600;fill:#f0f6fc}
</style>
</head>
<body>
<h1>数字分身 (Digital Twin) 架构图</h1>
<svg viewBox="0 0 1450 1350">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#58a6ff"/></marker>
    <marker id="arrow-data" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#3fb950"/></marker>
    <marker id="arrow-llm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#d2a8ff"/></marker>
  </defs>

  <!-- ============ 标题区域 ============ -->
  <text x="40" y="30" class="section-title">数据来源</text>
  <text x="40" y="50" class="badge">多种入口 → 摄入管道 → 三层记忆存储</text>

  <!-- 数据源 -->
  <rect x="60" y="70" width="190" height="55" rx="8" fill="#1f6feb" opacity="0.2" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="155" y="92" text-anchor="middle" fill="#58a6ff" font-weight="600" font-size="11">CC Session Hook</text>
  <text x="155" y="108" text-anchor="middle" fill="#8b949e" font-size="10">digital_twin_feed.py</text>

  <rect x="290" y="70" width="190" height="55" rx="8" fill="#1f6feb" opacity="0.2" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="385" y="92" text-anchor="middle" fill="#58a6ff" font-weight="600" font-size="11">DeepSeek 聊天导出</text>
  <text x="385" y="108" text-anchor="middle" fill="#8b949e" font-size="10">import_deepseek.py</text>

  <rect x="520" y="70" width="190" height="55" rx="8" fill="#1f6feb" opacity="0.2" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="615" y="92" text-anchor="middle" fill="#58a6ff" font-weight="600" font-size="11">飞书消息归档</text>
  <text x="615" y="108" text-anchor="middle" fill="#8b949e" font-size="10">import_feishu.py</text>

  <rect x="750" y="70" width="190" height="55" rx="8" fill="#1f6feb" opacity="0.2" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="845" y="92" text-anchor="middle" fill="#58a6ff" font-weight="600" font-size="11">手动输入</text>
  <text x="845" y="108" text-anchor="middle" fill="#8b949e" font-size="10">twin_feed / twin_learn</text>

  <rect x="980" y="70" width="190" height="55" rx="8" fill="#1f6feb" opacity="0.2" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="1075" y="92" text-anchor="middle" fill="#58a6ff" font-weight="600" font-size="11">知识缺口推送</text>
  <text x="1075" y="108" text-anchor="middle" fill="#8b949e" font-size="10">gap_detector ← ops-daemon</text>

  <!-- ============ 摄入管道 ============ -->
  <text x="40" y="170" class="section-title">摄入管道 (Ingestion Pipeline)</text>

  <rect x="60" y="190" width="1200" height="90" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="660" y="212" text-anchor="middle" fill="#f0f6fc" font-weight="600" font-size="12">twin/ingestion.py — 多阶段 LLM 驱动摄入</text>

  <!-- 摄入各阶段 -->
  <rect x="80" y="222" width="175" height="32" rx="4" fill="#1c2128" stroke="#21262d" stroke-width="1"/>
  <text x="167" y="242" text-anchor="middle" fill="#c9d1d9" font-size="10">1. 去重 (ingestion_log UNIQUE)</text>
  <line x1="255" y1="238" x2="265" y2="238" class="edge" marker-end="url(#arrow)"/>

  <rect x="270" y="222" width="175" height="32" rx="4" fill="#1c2128" stroke="#21262d" stroke-width="1"/>
  <text x="357" y="242" text-anchor="middle" fill="#c9d1d9" font-size="10">2. 质量评估 (classify + score)</text>
  <line x1="445" y1="238" x2="455" y2="238" class="edge" marker-end="url(#arrow)"/>

  <rect x="460" y="222" width="175" height="32" rx="4" fill="#1c2128" stroke="#21262d" stroke-width="1"/>
  <text x="547" y="242" text-anchor="middle" fill="#c9d1d9" font-size="10">3. 新颖性检查</text>
  <line x1="635" y1="238" x2="645" y2="238" class="edge" marker-end="url(#arrow)"/>

  <rect x="650" y="222" width="175" height="32" rx="4" fill="#1c2128" stroke="#d2a8ff" stroke-width="1"/>
  <text x="737" y="242" text-anchor="middle" fill="#d2a8ff" font-size="10">4. LLM 分类 → event/belief/pattern</text>
  <line x1="825" y1="238" x2="835" y2="238" class="edge" marker-end="url(#arrow)"/>

  <rect x="840" y="222" width="140" height="32" rx="4" fill="#1c2128" stroke="#3fb950" stroke-width="1"/>
  <text x="910" y="242" text-anchor="middle" fill="#3fb950" font-size="10">5. 存储 3 表 + embedding</text>

  <!-- 连接数据源到摄入管道 -->
  <line x1="155" y1="125" x2="155" y2="218" class="edge-data" marker-end="url(#arrow-data)"/>
  <line x1="385" y1="125" x2="385" y2="218" class="edge-data" marker-end="url(#arrow-data)"/>
  <line x1="615" y1="125" x2="615" y2="218" class="edge-data" marker-end="url(#arrow-data)"/>
  <line x1="845" y1="125" x2="845" y2="218" class="edge-data" marker-end="url(#arrow-data)"/>

  <!-- ============ 三层记忆存储 ============ -->
  <text x="40" y="325" class="section-title">SQLite 存储 (SQLite WAL · 6 张表)</text>

  <!-- 存储 DB -->
  <rect x="60" y="345" width="280" height="50" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="200" y="365" text-anchor="middle" fill="#3fb950" font-weight="600" font-size="11">data/twin.db</text>
  <text x="200" y="383" text-anchor="middle" fill="#8b949e" font-size="10">WAL 模式 · row_factory = sqlite3.Row</text>

  <!-- 6 张表 -->
  <rect x="380" y="335" width="170" height="32" rx="4" fill="#1c2128" stroke="#21262d" stroke-width="1"/>
  <text x="465" y="355" text-anchor="middle" fill="#c9d1d9" font-size="10">persona · 身份卡 (单行)</text>

  <rect x="570" y="335" width="170" height="32" rx="4" fill="#1c2128" stroke="#21262d" stroke-width="1"/>
  <text x="655" y="355" text-anchor="middle" fill="#c9d1d9" font-size="10">events · 事件记忆</text>

  <rect x="760" y="335" width="170" height="32" rx="4" fill="#1c2128" stroke="#21262d" stroke-width="1"/>
  <text x="845" y="355" text-anchor="middle" fill="#c9d1d9" font-size="10">beliefs · 语义记忆</text>

  <rect x="380" y="375" width="170" height="32" rx="4" fill="#1c2128" stroke="#21262d" stroke-width="1"/>
  <text x="465" y="395" text-anchor="middle" fill="#c9d1d9" font-size="10">patterns · 程序记忆</text>

  <rect x="570" y="375" width="170" height="32" rx="4" fill="#1c2128" stroke="#21262d" stroke-width="1"/>
  <text x="655" y="395" text-anchor="middle" fill="#c9d1d9" font-size="10">ingestion_log · 去重账本</text>

  <rect x="760" y="375" width="170" height="32" rx="4" fill="#1c2128" stroke="#21262d" stroke-width="1"/>
  <text x="845" y="395" text-anchor="middle" fill="#c9d1d9" font-size="10">memory_embeddings · 向量</text>

  <!-- 摄入→DB -->
  <line x1="155" y1="280" x2="155" y2="342" class="edge-data" marker-end="url(#arrow-data)"/>

  <!-- ============ 身份卡 ============ -->
  <text x="40" y="450" class="section-title">身份卡 (Persona Card)</text>

  <rect x="60" y="470" width="750" height="85" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="435" y="490" text-anchor="middle" fill="#f0f6fc" font-weight="600" font-size="11">twin/persona.py</text>

  <!-- 各字段 -->
  <rect x="80" y="500" width="100" height="22" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="130" y="515" text-anchor="middle" fill="#8b949e" font-size="9">name / bio</text>
  <rect x="190" y="500" width="110" height="22" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="245" y="515" text-anchor="middle" fill="#8b949e" font-size="9">values_weights (JSON)</text>
  <rect x="310" y="500" width="110" height="22" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="365" y="515" text-anchor="middle" fill="#8b949e" font-size="9">expertise (JSON)</text>
  <rect x="430" y="500" width="130" height="22" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="495" y="515" text-anchor="middle" fill="#8b949e" font-size="9">personality_traits</text>
  <rect x="570" y="500" width="130" height="22" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="635" y="515" text-anchor="middle" fill="#8b949e" font-size="9">language_fingerprint</text>
  <rect x="710" y="500" width="90" height="22" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="755" y="515" text-anchor="middle" fill="#8b949e" font-size="9">fidelity (0-1)</text>

  <rect x="80" y="528" width="100" height="20" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="130" y="541" text-anchor="middle" fill="#8b949e" font-size="9">worldview</text>
  <rect x="190" y="528" width="110" height="20" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="245" y="541" text-anchor="middle" fill="#8b949e" font-size="9">thinking_style</text>
  <rect x="310" y="528" width="110" height="20" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="365" y="541" text-anchor="middle" fill="#8b949e" font-size="9">style (JSON)</text>
  <rect x="430" y="528" width="130" height="20" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="495" y="541" text-anchor="middle" fill="#8b949e" font-size="9">blindspots</text>
  <rect x="570" y="528" width="130" height="20" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="635" y="541" text-anchor="middle" fill="#8b949e" font-size="9">decision_patterns</text>

  <!-- ============ 推理管道 ============ -->
  <text x="40" y="600" class="section-title">推理管道 (Reasoning Pipeline) — twin_chat 核心 L1-L2-L3</text>

  <rect x="60" y="620" width="1250" height="150" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="685" y="642" text-anchor="middle" fill="#f0f6fc" font-weight="600" font-size="12">twin/reasoning.py</text>

  <!-- L1 -->
  <rect x="80" y="655" width="250" height="70" rx="5" fill="#1c2128" stroke="#58a6ff" stroke-width="1"/>
  <text x="205" y="672" text-anchor="middle" fill="#58a6ff" font-weight="600" font-size="11">L1 身份卡（事实层）</text>
  <text x="205" y="690" text-anchor="middle" fill="#8b949e" font-size="9">format_persona() → 系统 Prompt</text>
  <text x="205" y="706" text-anchor="middle" fill="#8b949e" font-size="9">name · bio · worldview · traits</text>

  <line x1="330" y1="690" x2="350" y2="690" class="edge" marker-end="url(#arrow)"/>

  <!-- L2 -->
  <rect x="355" y="655" width="250" height="70" rx="5" fill="#1c2128" stroke="#e3b341" stroke-width="1"/>
  <text x="480" y="672" text-anchor="middle" fill="#e3b341" font-weight="600" font-size="11">L2 决策权重层</text>
  <text x="480" y="690" text-anchor="middle" fill="#8b949e" font-size="9">values_weights JSON</text>
  <text x="480" y="706" text-anchor="middle" fill="#8b949e" font-size="9">{conflict, direction, weight, evidence}</text>

  <line x1="605" y1="690" x2="625" y2="690" class="edge" marker-end="url(#arrow)"/>

  <!-- L3 -->
  <rect x="630" y="655" width="660" height="70" rx="5" fill="#1c2128" stroke="#d2a8ff" stroke-width="1"/>
  <text x="960" y="672" text-anchor="middle" fill="#d2a8ff" font-weight="600" font-size="11">L3 相关记忆检索（情境层）</text>
  <text x="960" y="690" text-anchor="middle" fill="#8b949e" font-size="9">向量检索 (cosine) + 关键词检索 (SQL LIKE) → merge top-15 → LLM rerank → top-10</text>
  <text x="960" y="706" text-anchor="middle" fill="#8b949e" font-size="9">每命中 +retrieval_count (信号增强) · 未命中 ×0.95 (衰减)</text>

  <!-- 检索细节 -->
  <rect x="80" y="735" width="590" height="25" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="375" y="751" text-anchor="middle" fill="#8b949e" font-size="9">向量检索: text-embedding-v3 (1024维) → memory_embeddings 表 cosine 相似度</text>
  <rect x="690" y="735" width="600" height="25" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="990" y="751" text-anchor="middle" fill="#8b949e" font-size="9">关键词检索: LLM 提取关键词 → SQL LIKE events/beliefs/patterns</text>

  <!-- ============ MCP 服务器层 ============ -->
  <text x="40" y="810" class="section-title">MCP 服务器 (TS stdio + Python bridge)</text>

  <rect x="60" y="830" width="280" height="55" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="200" y="852" text-anchor="middle" fill="#f0f6fc" font-weight="600" font-size="11">TS MCP Server (src/server.ts)</text>
  <text x="200" y="870" text-anchor="middle" fill="#8b949e" font-size="10">13 个 Zod-validated 工具</text>

  <rect x="380" y="830" width="240" height="55" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="500" y="852" text-anchor="middle" fill="#f0f6fc" font-weight="600" font-size="11">Python Bridge</text>
  <text x="500" y="870" text-anchor="middle" fill="#8b949e" font-size="10">_twin_bridge.py (JSON-line stdio)</text>

  <line x1="340" y1="857" x2="375" y2="857" class="edge" marker-end="url(#arrow)"/>

  <!-- 13 工具 -->
  <rect x="60" y="900" width="175" height="24" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="147" y="916" text-anchor="middle" fill="#8b949e" font-size="9">twin_chat · 第一人称对话</text>
  <rect x="245" y="900" width="175" height="24" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="332" y="916" text-anchor="middle" fill="#8b949e" font-size="9">twin_verify · 一致性检查</text>
  <rect x="430" y="900" width="175" height="24" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="517" y="916" text-anchor="middle" fill="#8b949e" font-size="9">twin_learn · 摄入新信息</text>
  <rect x="615" y="900" width="175" height="24" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="702" y="916" text-anchor="middle" fill="#8b949e" font-size="9">twin_feed · 主动投喂</text>
  <rect x="800" y="900" width="175" height="24" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="887" y="916" text-anchor="middle" fill="#8b949e" font-size="9">twin_status · 画像统计</text>

  <rect x="60" y="930" width="175" height="24" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="147" y="946" text-anchor="middle" fill="#8b949e" font-size="9">twin_query · 记忆检索</text>
  <rect x="245" y="930" width="175" height="24" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="332" y="946" text-anchor="middle" fill="#8b949e" font-size="9">twin_timeline · 时间线</text>
  <rect x="430" y="930" width="175" height="24" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="517" y="946" text-anchor="middle" fill="#8b949e" font-size="9">twin_detect_conflicts · 冲突检测</text>
  <rect x="615" y="930" width="175" height="24" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="702" y="946" text-anchor="middle" fill="#8b949e" font-size="9">twin_forget · 删除记忆</text>
  <rect x="800" y="930" width="175" height="24" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="887" y="946" text-anchor="middle" fill="#8b949e" font-size="9">twin_decay · 记忆衰减</text>

  <rect x="60" y="960" width="175" height="24" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="147" y="976" text-anchor="middle" fill="#8b949e" font-size="9">twin_persona_update · 手动更新</text>
  <rect x="245" y="960" width="175" height="24" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="332" y="976" text-anchor="middle" fill="#8b949e" font-size="9">twin_refine_persona · 自动精炼</text>
  <rect x="430" y="960" width="175" height="24" rx="3" fill="#1c2128" stroke="#21262d" stroke-width="0.5"/>
  <text x="517" y="976" text-anchor="middle" fill="#8b949e" font-size="9">twin_gap_check · 知识缺口检测</text>

  <!-- ============ 维护管道 ============ -->
  <text x="40" y="1030" class="section-title">维护管道</text>

  <rect x="60" y="1050" width="350" height="70" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
  <text x="235" y="1070" text-anchor="middle" fill="#e3b341" font-weight="600" font-size="11">twin/refine.py · 身份卡自动精炼</text>
  <text x="235" y="1088" text-anchor="middle" fill="#8b949e" font-size="9">每 50 次摄入自动触发 · 取最近记忆 → LLM 提取</text>
  <text x="235" y="1104" text-anchor="middle" fill="#8b949e" font-size="9">决策权重 · 人格特质 · 语言指纹 · 盲区 → update persona</text>

  <rect x="450" y="1050" width="300" height="70" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
  <text x="600" y="1070" text-anchor="middle" fill="#e3b341" font-weight="600" font-size="11">twin/conflict.py · 语义矛盾检测</text>
  <text x="600" y="1088" text-anchor="middle" fill="#8b949e" font-size="9">strength &gt; 0.3 的 belief 两两配对</text>
  <text x="600" y="1104" text-anchor="middle" fill="#8b949e" font-size="9">LLM 判断 contradiction → contradictory_to</text>

  <rect x="790" y="1050" width="350" height="70" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
  <text x="965" y="1070" text-anchor="middle" fill="#e3b341" font-weight="600" font-size="11">twin/gap_detector.py · 知识缺口推送</text>
  <text x="965" y="1088" text-anchor="middle" fill="#8b949e" font-size="9">分析 persona + beliefs → LLM 生成场景问题</text>
  <text x="965" y="1104" text-anchor="middle" fill="#8b949e" font-size="9">去重 → 飞书交互式卡片 → twin_gap_state.json</text>

  <!-- 信号衰减系统 -->
  <text x="40" y="1155" class="section-title">信号衰减系统 (Signal-Based Decay)</text>

  <rect x="60" y="1175" width="570" height="60" rx="6" fill="#1c2128" stroke="#21262d" stroke-width="1"/>
  <text x="345" y="1195" text-anchor="middle" fill="#c9d1d9" font-size="11">retrieval_count &gt; 0 的 memory → importance/strength += 0.01 (boost)</text>
