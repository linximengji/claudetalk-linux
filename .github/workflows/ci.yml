name: CI
on: [push, pull_request]
jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run type-check
      - name: lint
        run: bun run lint
        continue-on-error: true
      - name: test
        run: bun test
        continue-on-error: true
